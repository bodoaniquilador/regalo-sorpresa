<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universo Chinita</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <style>
        * { -webkit-tap-highlight-color: transparent; outline: none; }
        html, body { 
            margin: 0; padding: 0; background: #000; overflow: hidden; 
            touch-action: none; position: fixed; width: 100%; height: 100%;
            font-family: 'Montserrat', sans-serif;
        }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        #playBtn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 20px 40px; font-size: 1.2rem; color: white;
            background: rgba(255, 255, 255, 0.1); border: 2px solid #FF007F;
            border-radius: 50px; cursor: pointer; z-index: 100;
            font-family: 'Montserrat', sans-serif;
            backdrop-filter: blur(10px); box-shadow: 0 0 20px #FF007F;
            transition: 0.5s;
        }
        #playBtn:hover { box-shadow: 0 0 40px #8A2BE2; transform: translate(-50%, -50%) scale(1.1); }

        .mensaje-central {
            position: absolute; top: 30px; left: 50%; transform: translateX(-50%);
            color: #fff; text-align: center; z-index: 10; pointer-events: none;
            text-shadow: 0 0 15px #FF007F, 0 0 30px #8A2BE2;
            font-size: 1.1rem; opacity: 0; transition: 2s;
        }
    </style>
</head>
<body>

<button id="playBtn">Toca para empezar ✨</button>
<div class="mensaje-central" id="header">FELIZ CUMPLEAÑOS CHINITA ❤️</div>

<audio id="musica" preload="auto">
    <source src="https://s3.aconvert.com/convert/p3r68-cdx67/xs29x-wkvji.mp3" type="audio/mpeg">
</audio>

<canvas id="galaxyCanvas"></canvas>

<script>
const canvas = document.getElementById('galaxyCanvas');
const ctx = canvas.getContext('2d', { alpha: false });
const audio = document.getElementById('musica');
const playBtn = document.getElementById('playBtn');
const header = document.getElementById('header');

let particles = [];
let angleX = 0.5, angleY = 0, zoom = 1.0;
let velX = 0, velY = 0.0008; 
let isDragging = false, lastX = 0, lastY = 0;
let started = false;
let initialPinchDist = 0;

const tiempoInicio = 125; 
const tiempoFin = 152;    
const tiempoTransicion = 3; 

const colores = ['#FF007F', '#8A2BE2', '#00D4FF', '#FFFFFF', '#FFD700'];
const palabras = ["Chinita", "Pechocha", "Hermosa", "Bellísima", "Te quiero", "Te aprecio", "Te adoro", "✨"];

function init() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    particles = [];
    for (let i = 0; i < 750; i++) {
        particles.push(new Point3D(Math.random() < 0.15)); 
    }
}

class Point3D {
    constructor(isWord) {
        this.isWord = isWord;
        // DISTRIBUCIÓN LIBRE (No en anillo, sino esférica alrededor del sol)
        this.dist = 160 + Math.random() * 1100; 
        this.phi = Math.acos((Math.random() * 2) - 1);
        this.theta = Math.random() * Math.PI * 2;
        this.color = colores[Math.floor(Math.random() * colores.length)];
        this.text = isWord ? palabras[Math.floor(Math.random() * palabras.length)] : "";
        this.size = isWord ? 16 : Math.random() * 2 + 0.5;
        this.wobble = Math.random() * Math.PI * 2;
        this.orbitSpeed = 0.0003 + Math.random() * 0.0006;
    }

    draw(time) {
        let currentTheta = this.theta + time * this.orbitSpeed;
        let d = this.dist + Math.sin(time * 0.001 + this.wobble) * 15;
        
        let x = d * Math.sin(this.phi) * Math.cos(currentTheta);
        let y = d * Math.sin(this.phi) * Math.sin(currentTheta);
        let z = d * Math.cos(this.phi);

        let x1 = x * Math.cos(angleY) - z * Math.sin(angleY);
        let z1 = x * Math.sin(angleY) + z * Math.cos(angleY);
        let y2 = y * Math.cos(angleX) - z1 * Math.sin(angleX);
        let z2 = y * Math.sin(angleX) + z1 * Math.cos(angleX);

        let factor = 700 / (700 + z2);
        let sX = (x1 * factor * zoom) + canvas.width / 2;
        let sY = (y2 * factor * zoom) + canvas.height / 2;

        if (z2 > -650) {
            ctx.globalAlpha = Math.min(1, factor * 1.8);
            if (this.isWord) {
                ctx.shadowBlur = 12 * factor;
                ctx.shadowColor = this.color;
                ctx.fillStyle = "#FFF";
                ctx.font = `bold ${this.size * factor * zoom}px Montserrat`;
                ctx.textAlign = "center";
                ctx.fillText(this.text, sX, sY);
                ctx.shadowBlur = 0;
            } else {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(sX, sY, this.size * factor * zoom, 0, Math.PI * 2);
                ctx.fill();
            }
        }
    }
}

function drawSun(time) {
    let sX = canvas.width / 2;
    let sY = canvas.height / 2;
    let baseRadius = 60 * zoom;
    let pulse = Math.sin(time * 0.003) * 10;
    let grad = ctx.createRadialGradient(sX, sY, 0, sX, sY, baseRadius * 5 + pulse);
    grad.addColorStop(0, 'rgba(255, 255, 255, 1)');
    grad.addColorStop(0.2, 'rgba(255, 215, 0, 0.9)');
    grad.addColorStop(0.5, 'rgba(255, 0, 127, 0.4)');
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(sX, sY, baseRadius * 5 + pulse, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "rgba(255, 255, 255, 0.4)";
    ctx.font = `bold ${20 * zoom}px Montserrat`;
    ctx.textAlign = "center";
    ctx.fillText("I love you", sX, sY + (7 * zoom));
}

function animate(time) {
    if(!started) return;
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    drawSun(time);

    let tiempoRestante = tiempoFin - audio.currentTime;
    if (tiempoRestante <= tiempoTransicion && tiempoRestante > 0) {
        audio.volume = Math.max(0, tiempoRestante / tiempoTransicion);
    } else if (audio.currentTime < tiempoInicio + tiempoTransicion) {
        let progresoInicio = (audio.currentTime - tiempoInicio) / tiempoTransicion;
        audio.volume = Math.min(1, Math.max(0, progresoInicio));
    } else {
        audio.volume = 1;
    }

    if (audio.currentTime >= tiempoFin) {
        audio.currentTime = tiempoInicio;
        audio.play();
    }

    if (!isDragging) {
        angleY += velY;
        angleX += velX;
        velY *= 0.95; velX *= 0.95;
        angleY += 0.0008; 
    }

    particles.forEach(p => p.draw(time));
    requestAnimationFrame(animate);
}

playBtn.onclick = () => {
    started = true;
    audio.currentTime = tiempoInicio;
    audio.volume = 0;
    audio.play();
    playBtn.style.display = 'none';
    header.style.opacity = '1';
    init();
    animate(0);
};

// Controles táctiles y mouse (mantenidos)
const start = (x, y) => { isDragging = true; lastX = x; lastY = y; };
const move = (x, y) => {
    if(isDragging) {
        velY = (x - lastX) * 0.004;
        velX = (y - lastY) * 0.004;
        angleY += velY;
        angleX += velX;
        lastX = x; lastY = y;
    }
};

window.addEventListener('mousedown', e => start(e.clientX, e.clientY));
window.addEventListener('mousemove', e => move(e.clientX, e.clientY));
window.addEventListener('mouseup', () => isDragging = false);
window.addEventListener('wheel', e => {
    zoom = Math.min(Math.max(0.2, zoom - e.deltaY * 0.0008), 5.0);
}, { passive: true });

window.addEventListener('touchstart', e => {
    if (e.touches.length === 2) {
        initialPinchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    } else {
        start(e.touches[0].clientX, e.touches[0].clientY);
    }
}, {passive: true});

window.addEventListener('touchmove', e => {
    if (e.touches.length === 2 && initialPinchDist > 0) {
        const currentDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        zoom = Math.min(Math.max(0.2, zoom * (currentDist / initialPinchDist)), 5.0);
        initialPinchDist = currentDist;
    } else if (e.touches.length === 1) {
        move(e.touches[0].clientX, e.touches[0].clientY);
    }
    if(e.cancelable) e.preventDefault();
}, {passive: false});

window.addEventListener('touchend', () => {
    isDragging = false;
    initialPinchDist = 0;
});

window.onresize = init;
</script>
</body>
</html>
